name: 歷史資料回補（手動執行一次）

# 只手動觸發。第四階段第一次用：補過去歷史收盤，
# 讓 MA/KD/MACD/RSI 算得出來。跑完一次即可，平日不需再跑。

on:
  workflow_dispatch:
    inputs:
      days:
        description: "回補幾個日曆日（建議 120；要更準可填 250）"
        required: true
        default: "120"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 回補歷史收盤
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backfill_history.py --days ${{ github.event.inputs.days }}

      - name: 回補後立即計算一次
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_signals.py
