name: Daily market data pipeline

on:
  schedule:
    # GitHub Actions uses UTC. Taiwan time is UTC+8.
    - cron: "30 6 * * 1-5"   # 14:30 Taiwan time
    - cron: "15 8 * * 1-5"   # 16:15 Taiwan time
  workflow_dispatch: {}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1) Fetch daily market data
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          THROTTLE_SEC: "3"
        run: python fetch_all.py

      - name: 2) Fetch market indexes
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_index.py

      - name: 3) Repair missing recent K bars
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REPAIR_LOOKBACK_DAYS: "3"
        run: python repair_missing_prices.py

      - name: 4) Compute daily signals
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_signals.py

      - name: 5) Run AI lab
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_MAX_CALLS: "8"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_ai_lab.py

      - name: 6) Data quality cleanup
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python data_quality_cleanup.py
