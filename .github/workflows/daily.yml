name: 每日盤後抓取與計算

on:
  schedule:
    # GitHub Actions 用 UTC。台灣 = UTC+8。
    - cron: "30 6 * * 1-5"   # 台灣 14:30 盤後初抓
    - cron: "15 8 * * 1-5"   # 台灣 16:15 盤後正式抓
  workflow_dispatch: {}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 1) 抓取盤後資料
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          THROTTLE_SEC: "3"
        run: python fetch_all.py

      - name: 2) 計算技術指標/題材/候選池
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_signals.py

      - name: 3) AI 量化模擬實驗室
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_MAX_CALLS: "8"
        run: python run_ai_lab.py
