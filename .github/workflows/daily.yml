name: Daily market data pipeline

on:
  schedule:
    # GitHub Actions uses UTC. Taiwan time is UTC+8.
    - cron: "45 5 * * 1-5"   # 13:45 Taiwan time
    - cron: "30 6 * * 1-5"   # 14:30 Taiwan time
    - cron: "15 8 * * 1-5"   # 16:15 Taiwan time
  workflow_dispatch: {}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1) Fetch daily market data
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          THROTTLE_SEC: "3"
        run: python fetch_all.py

      - name: 2) Fetch MIS same-day stock quotes
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_mis_daily_prices.py

      - name: 3) Fetch market indexes
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_index.py

      - name: 4) Fetch SPF market calendar
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_spf_calendar.py

      - name: 5) Repair missing recent K bars
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REPAIR_LOOKBACK_DAYS: "3"
        run: python repair_missing_prices.py

      - name: 6) Build stock industry classes
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_stock_classes.py

      - name: 7) Validate close prices with TWSE MIS
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MIS_VALIDATE_MAX_SYMBOLS: "220"
        run: python validate_mis_quotes.py

      - name: 8) Compute daily signals
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_signals.py

      - name: 9) Run AI lab
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_MAX_CALLS: "8"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_ai_lab.py

      - name: 10) Data quality cleanup
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python data_quality_cleanup.py

      - name: 11) Phase 6 pattern detector
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_patterns.py

      - name: 12) Phase 6 main force detector
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python mainforce_detector.py

      - name: 13) Phase 6 strategy center
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python strategy_center.py

      - name: 14) Phase 6 AI trade journal
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ai_trade_journal.py

      - name: 15) Phase 6 daily report
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python generate_daily_report.py
