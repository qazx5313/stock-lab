name: Realtime intraday market pipeline

on:
  schedule:
    # GitHub Actions uses UTC. Taiwan time is UTC+8.
    - cron: "15-55/5 1 * * 1-5" # 09:15-09:55 Taiwan time
    - cron: "*/5 2-4 * * 1-5"   # 10:00-12:55 Taiwan time
    - cron: "0-30/5 5 * * 1-5"  # 13:00-13:30 Taiwan time, close snapshot included
  workflow_dispatch: {}

concurrency:
  group: realtime-intraday-market
  cancel-in-progress: true

jobs:
  realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1) Fetch TWSE MIS realtime quotes
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_realtime_quotes.py

      - name: 2) Refresh AI intraday candidates and positions
        if: always()
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_ai_intraday.py
