<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>台股盤後題材操盤系統 · AI 量化模擬操盤實驗室</title>
<style>
  :root{
    --bg:#F8FAFC; --card:#FFFFFF; --primary:#2563EB; --primary-dark:#1D4ED8;
    --blue-soft:#DBEAFE; --blue-tint:#EFF6FF;
    --ink:#0F172A; --ink-2:#64748B; --ink-3:#94A3B8;
    --up:#DC2626; --down:#16A34A; --warn:#F59E0B;
    --border:#E2E8F0; --border-soft:#F1F5F9;
    --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.05);
    --shadow-lg:0 4px 24px rgba(15,23,42,.08);
    --r:14px; --r-sm:10px;
    --sans:'Noto Sans TC','PingFang TC','Microsoft JhengHei',-apple-system,system-ui,sans-serif;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.55;
    overscroll-behavior-y:none;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ===== Layout ===== */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:228px;flex-shrink:0;background:var(--card);
    border-right:1px solid var(--border);position:fixed;inset:0 auto 0 0;
    display:flex;flex-direction:column;z-index:50;
  }
  .brand{padding:20px 20px 16px;border-bottom:1px solid var(--border-soft)}
  .brand-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.2px}
  .brand-mark{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    background:linear-gradient(135deg,var(--primary),#3B82F6);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;
  }
  .brand-sub{font-size:11px;color:var(--ink-3);margin-top:4px;font-weight:500;letter-spacing:.3px}
  .nav{padding:12px 12px;flex:1;overflow-y:auto}
  .nav-label{font-size:10.5px;font-weight:700;color:var(--ink-3);letter-spacing:1px;padding:14px 12px 7px;text-transform:uppercase}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);
    font-size:14px;color:var(--ink-2);font-weight:600;margin-bottom:2px;transition:.13s;
  }
  .nav-item:hover{background:var(--blue-tint);color:var(--ink)}
  .nav-item.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.28)}
  .nav-ic{width:18px;height:18px;flex-shrink:0;opacity:.9}
  .nav-foot{padding:14px 18px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--ink-3)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--down);margin-right:6px;vertical-align:middle}

  .main{margin-left:228px;flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    height:60px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:14px;padding:0 26px;
  }
  .topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .topbar .sub{font-size:12px;color:var(--ink-3);font-weight:500}
  .spacer{flex:1}
  .pill{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:6px 12px;border-radius:999px;background:var(--blue-tint);color:var(--primary);
  }
  .pill.live{background:#FEF2F2;color:var(--up)}
  .menu-btn{display:none}
  .content{padding:26px;max-width:1320px;width:100%}

  /* ===== Generic UI ===== */
  .grid{display:grid;gap:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
  .card-pad{padding:18px 20px}
  .card-h{
    display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--border-soft);
  }
  .card-h h3{font-size:15px;font-weight:800;letter-spacing:-.2px}
  .card-h .tag{font-size:11px;color:var(--ink-3);font-weight:600}
  .card-h .more{margin-left:auto;font-size:12px;color:var(--primary);font-weight:700}
  .sec-title{font-size:13px;font-weight:800;color:var(--ink-2);letter-spacing:.4px;margin:4px 0 12px;text-transform:uppercase}

  /* ===== Dashboard Home ===== */
  .dash{display:flex;flex-direction:column;gap:18px}
  .dash-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .dash-title{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:900;letter-spacing:-.3px}
  .dash-title .target{display:inline-flex;width:30px;height:30px;align-items:center;justify-content:center;border-radius:9px;background:#FEF2F2}
  .dash-head .hint{font-size:13px;color:var(--ink-2);font-weight:600}
  .pick-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
  .pick-card{padding:18px 18px 16px;border-radius:var(--r);border:1px solid var(--border);background:linear-gradient(145deg,#fff,#F8FAFC);box-shadow:var(--shadow);min-width:0}
  .pick-card.best{background:linear-gradient(145deg,#FFFFFF,#F0FDF4);border-color:#BBF7D0}
  .pick-card.watch{background:linear-gradient(145deg,#FFFFFF,#FFFBEB);border-color:#FDE68A}
  .pick-top{display:flex;align-items:flex-start;gap:12px}
  .pick-code{font-family:var(--mono);font-size:23px;font-weight:900;letter-spacing:-.4px;line-height:1}
  .pick-name{font-size:14px;font-weight:800;margin-top:4px}
  .score-ring{width:86px;height:86px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--up) calc(var(--score)*1%),#F1F5F9 0);padding:7px;flex-shrink:0}
  .score-ring i{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:#fff;font-style:normal}
  .score-ring b{display:block;font-size:26px;font-family:var(--mono);line-height:1;color:var(--up)}
  .score-ring span{display:block;text-align:center;font-size:11px;color:var(--ink-2);font-weight:700;margin-bottom:3px}
  .pick-scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0 12px}
  .mini-score{border-radius:9px;background:rgba(255,255,255,.72);border:1px solid var(--border-soft);padding:8px 9px}
  .mini-score span{display:block;font-size:11px;color:var(--ink-2);font-weight:700}
  .mini-score b{font-family:var(--mono);font-size:15px}
  .pick-reason{font-size:12.5px;color:var(--ink-2);line-height:1.55;min-height:40px}
  .pick-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .dash-metrics{display:grid;grid-template-columns:1.05fr 1.2fr 1fr .9fr;gap:16px}
  .meter{height:106px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
  .meter-arc{width:150px;height:78px;border-radius:150px 150px 0 0;background:conic-gradient(from 270deg,#86EFAC 0deg,#FACC15 78deg,#22C55E 140deg,#E5E7EB 141deg);position:relative;overflow:hidden}
  .meter-arc:after{content:"";position:absolute;inset:18px 18px 0;background:#fff;border-radius:140px 140px 0 0}
  .needle{position:absolute;width:54px;height:4px;background:var(--down);left:68px;bottom:10px;border-radius:99px;transform:rotate(-18deg);transform-origin:4px center;z-index:2}
  .spark{height:82px;width:100%;margin-top:8px}
  .barline{display:grid;grid-template-columns:var(--upw) var(--downw) 1fr;height:14px;border-radius:99px;overflow:hidden;background:#CBD5E1;margin-top:14px}
  .barline i:nth-child(1){background:var(--up)}
  .barline i:nth-child(2){background:var(--down)}
  .barline i:nth-child(3){background:#CBD5E1}
  .flow-list{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .flow-row{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;font-weight:800}
  .dashboard-table-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
  .compare-mini td,.compare-mini th{text-align:center}
  .compare-mini td:first-child,.compare-mini th:first-child{text-align:left}

  /* ===== Account & Activation ===== */
  .account-grid{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(360px,1.1fr);gap:18px;align-items:start}
  .form-grid{display:grid;gap:12px}
  .field label{display:block;font-size:12px;color:var(--ink-2);font-weight:800;margin-bottom:6px}
  .field input,.field select{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
    background:#fff;color:var(--ink);font-family:var(--sans);font-size:13.5px;outline:none;
  }
  .field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .auth-panel{background:linear-gradient(145deg,#fff,#F8FAFC)}
  .auth-status{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 16px;border-radius:12px;background:var(--blue-tint);border:1px solid var(--blue-soft)}
  .avatar{width:42px;height:42px;border-radius:12px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:900}
  .top-auth{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .top-user{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:999px;background:var(--blue-tint);border:1px solid var(--blue-soft)}
  .top-user .avatar{width:28px;height:28px;border-radius:9px;font-size:12px}
  .top-user b{font-size:13px}
  .top-user span{font-size:12px;color:var(--ink-2);font-weight:700}
  .activation-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .activation-card{border:1px solid var(--border);border-radius:12px;padding:13px 14px;background:#fff}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .toggle{width:42px;height:24px;border-radius:999px;background:#CBD5E1;position:relative;flex-shrink:0}
  .toggle:after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.15s;box-shadow:var(--shadow)}
  .toggle.on{background:var(--primary)}
  .toggle.on:after{left:21px}

  .stat{display:flex;flex-direction:column;gap:5px}
  .stat .k{font-size:12px;color:var(--ink-2);font-weight:600}
  .stat .v{font-size:24px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .stat .d{font-size:12px;font-weight:700}
  .up{color:var(--up)} .down{color:var(--down)} .warn{color:var(--warn)} .muted{color:var(--ink-2)}
  .num{font-variant-numeric:tabular-nums;font-family:var(--mono)}

  .badge{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:7px;background:var(--blue-soft);color:var(--primary-dark);white-space:nowrap;
  }
  .badge.hot{background:#FEF2F2;color:var(--up)}
  .badge.warm{background:#FFF7ED;color:#C2410C}
  .badge.cool{background:#F0FDF4;color:var(--down)}
  .badge.obs{background:#F1F5F9;color:var(--ink-2)}
  .badge.good{background:#FEF2F2;color:var(--up)}
  .badge.bad{background:#F0FDF4;color:var(--down)}
  .badge.neu{background:#F1F5F9;color:var(--ink-2)}

  .scorebar{height:6px;border-radius:99px;background:var(--border-soft);overflow:hidden;min-width:54px}
  .scorebar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),#60A5FA)}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  thead th{
    text-align:left;font-size:11.5px;font-weight:700;color:var(--ink-2);
    padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap;
    background:var(--bg);position:sticky;top:0;
  }
  tbody td{padding:12px 14px;border-bottom:1px solid var(--border-soft);white-space:nowrap}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:.1s}
  tbody tr:hover{background:var(--blue-tint)}
  td.r,th.r{text-align:right}
  .lnk{color:var(--primary);font-weight:700;cursor:pointer}
  .code{font-family:var(--mono);font-weight:700;font-size:13px}

  .btn{
    display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;
    padding:9px 16px;border-radius:var(--r-sm);background:var(--primary);color:#fff;transition:.13s;
  }
  .btn:hover{background:var(--primary-dark)}
  .btn.ghost{background:var(--blue-tint);color:var(--primary)}
  .btn.line{background:#fff;border:1px solid var(--border);color:var(--ink-2)}
  .btn.sm{padding:6px 11px;font-size:12px}

  .chip{
    display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;
    padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:#fff;
    color:var(--ink-2);transition:.13s;cursor:pointer;user-select:none;
  }
  .chip:hover{border-color:var(--primary);color:var(--primary)}
  .chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

  .seg{display:inline-flex;background:var(--border-soft);border-radius:var(--r-sm);padding:3px}
  .seg button{padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:700;color:var(--ink-2)}
  .seg button.on{background:#fff;color:var(--primary);box-shadow:var(--shadow)}

  .ph{
    display:flex;align-items:center;justify-content:center;gap:8px;
    color:var(--ink-3);font-size:13px;font-weight:600;
  }
  .progress{height:8px;border-radius:99px;background:var(--border-soft);overflow:hidden}
  .progress i{display:block;height:100%;background:var(--primary);border-radius:99px;transition:.4s}

  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .stagger>*{animation:fade .4s ease backwards}
  .stagger>*:nth-child(1){animation-delay:.02s}
  .stagger>*:nth-child(2){animation-delay:.06s}
  .stagger>*:nth-child(3){animation-delay:.10s}
  .stagger>*:nth-child(4){animation-delay:.14s}
  .stagger>*:nth-child(5){animation-delay:.18s}
  .stagger>*:nth-child(6){animation-delay:.22s}

  /* ===== Mobile ===== */
  .mob-nav{display:none}
  @media(max-width:980px){
    .sidebar{transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:none}
    .scrim{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:45}
    .scrim.show{display:block}
    .main{margin-left:0}
    .menu-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:9px;background:var(--blue-tint);color:var(--primary)}
    .content{padding:16px 14px 90px}
    .topbar{padding:0 16px;height:56px}
    .topbar h1{font-size:15px}
    .topbar .sub{display:none}
    .top-auth .pill{display:none}
    .top-user span{display:none}
    .stat .v{font-size:21px}
    .mob-nav{
      display:flex;position:fixed;bottom:0;left:0;right:0;height:64px;z-index:44;
      background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
      border-top:1px solid var(--border);padding:6px 4px env(safe-area-inset-bottom);
    }
    .mob-nav a{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      font-size:10px;font-weight:700;color:var(--ink-3);border-radius:10px;
    }
    .mob-nav a.active{color:var(--primary)}
    .mob-nav svg{width:21px;height:21px}
    .pick-grid,.dash-metrics,.dashboard-table-grid{grid-template-columns:1fr}
    .account-grid{grid-template-columns:1fr}
    .dash>.grid{grid-template-columns:1fr!important}
    .dash-head{align-items:flex-start}
    .pick-reason{min-height:0}
  }
  @media(min-width:981px){.mob-only{display:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="scrim" id="scrim" onclick="toggleNav(false)"></div>
  <div class="main">
    <header class="topbar">
      <button class="menu-btn mob-only" onclick="toggleNav(true)" aria-label="選單">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <h1 id="pgTitle">今日市場總覽</h1>
        <div class="sub" id="pgSub">2025/05/16（五）盤後 · 資料已更新</div>
      </div>
      <div class="spacer"></div>
      <span class="pill"><span class="dot"></span>盤後資料 · 16:42 更新</span>
      <div class="top-auth" id="topAuth"></div>
    </header>
    <main class="content" id="view"></main>
  </div>
</div>
<nav class="mob-nav" id="mobNav"></nav>
<script>
/* ============ Supabase 設定 ============
   只用 anon key（公開金鑰，僅能讀取，已設 RLS 保護）。
   service_role 絕不放這裡，只放 GitHub Actions Secrets。 */
const SB_URL  = 'https://wgyumblfupaspzywiwzc.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndneXVtYmxmdXBhc3B6eXdpd3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDg5NjksImV4cCI6MjA5NDU4NDk2OX0.pUur9c40B76uOsI4LphE2cwtE_oqBWUMOwIT-L8qu9g';

async function sbGet(path, hi){
  const headers = { apikey:SB_ANON, Authorization:`Bearer ${SB_ANON}` };
  if(hi){ headers['Range-Unit']='items'; headers['Range']='0-'+hi; }
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers });
  if(!r.ok){
    const body = await r.text().catch(()=> '');
    throw new Error('Supabase '+r.status+' '+body.slice(0,160));
  }
  return r.json();
}
async function sbWrite(path, body, method='POST'){
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers:{
      apikey:SB_ANON, Authorization:`Bearer ${SB_ANON}`,
      'Content-Type':'application/json', Prefer:'return=representation'
    },
    body:JSON.stringify(body)
  });
  if(!r.ok){
    const txt = await r.text().catch(()=> '');
    throw new Error('Supabase '+r.status+' '+txt.slice(0,160));
  }
  return r.json();
}

let SRC_STATUS = '載入中…';

/* 嘗試用真實資料覆蓋 DATA.*；任何錯誤都退回假資料，畫面不壞。
   來源狀態只顯示在「資料更新狀態」頁，避免干擾主畫面。 */
async function loadReal(){
  try{
    // 直接問資料庫「最大的交易日」（排序取 1 筆，最穩，不受筆數上限影響）
    const newest = await sbGet('daily_prices?select=date&order=date.desc&limit=1');
    if(!Array.isArray(newest) || newest.length===0){
      SRC_STATUS = '⚠️ 資料庫尚無 daily_prices 資料，顯示範例'; return;
    }
    const todayStr = new Date().toISOString().slice(0,10);
    let d = String(newest[0].date).slice(0,10);
    // 萬一最大日落在未來（資料異常），退而取 <= 今天的最大日
    if(d > todayStr){
      const safe = await sbGet(
        `daily_prices?select=date&date=lte.${todayStr}&order=date.desc&limit=1`);
      if(Array.isArray(safe) && safe.length) d = String(safe[0].date).slice(0,10);
    }
    if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){
      SRC_STATUS = '⚠️ 找不到有效交易日，顯示範例'; return;
    }
    console.log('[stock-lab] 採用最近交易日:', d);

    // 用 Prefer:count 拿總筆數，比抓全部 symbol 再 .length 穩又省流量
    async function cnt(q){
      const r = await fetch(`${SB_URL}/rest/v1/${q}`,{
        headers:{ apikey:SB_ANON, Authorization:`Bearer ${SB_ANON}`,
                  Prefer:'count=exact', Range:'0-0' }});
      const cr = r.headers.get('content-range') || '';
      const m = cr.match(/\/(\d+)$/);
      return m ? parseInt(m[1],10) : 0;
    }
    const upN = await cnt(`daily_prices?select=symbol&date=eq.${d}&change=gt.0`);
    const dnN = await cnt(`daily_prices?select=symbol&date=eq.${d}&change=lt.0`);
    if(upN+dnN>0){ DATA.market.up = upN; DATA.market.down = dnN; }
    DATA.meta.date = d.replace(/-/g,'/');

    // 大盤指數（真實，取最新一日）
    try{
      const idx = await sbGet(
        `market_index?select=market,index_value,change,change_percent&date=eq.${d}`, 10);
      (idx||[]).forEach(r=>{
        const o={ name:(r.market==='TWSE'?'加權指數':'櫃買指數'),
          v:Number(r.index_value),
          d:r.change!=null?Number(r.change):0,
          dp:r.change_percent!=null?Number(r.change_percent):0 };
        if(r.market==='TWSE') DATA.market.twse=o;
        else if(r.market==='TPEX') DATA.market.tpex=o;
      });
    }catch(e){ console.warn('指數載入略過:',e); }

    // 精選股：以 daily_signals 綜合分前 8（符合「系統綜合評分篩出」）
    const sigTop = await sbGet(
      `daily_signals?select=symbol,technical_score,chip_score,theme_score,final_score,summary`+
      `&date=eq.${d}&order=final_score.desc&limit=8`);
    if(Array.isArray(sigTop) && sigTop.length){
      const names = await sbGet('stocks?select=symbol,name,industry', 20000);
      const nameMap = {}; (names||[]).forEach(s=>nameMap[s.symbol]=s);
      // 補當日價格/漲跌/量
      const pr = await sbGet(
        `daily_prices?select=symbol,close,change_percent,volume&date=eq.${d}`, 20000);
      const pm = {}; (pr||[]).forEach(x=>pm[x.symbol]=x);
      DATA.picks = sigTop.map(sg=>{
        const p = pm[sg.symbol] || {};
        const cp = parseFloat(p.change_percent);
        const px = parseFloat(p.close);
        const vol = parseInt(p.volume);
        return {
          c:sg.symbol,
          n:(nameMap[sg.symbol]||{}).name||sg.symbol,
          t:(nameMap[sg.symbol]||{}).industry||'—',
          px:isFinite(px)?px:0,
          dp:isFinite(cp)?cp:0,
          vol:isFinite(vol)?vol.toLocaleString('en-US'):'—',
          ts:sg.technical_score!=null?sg.technical_score:'—',
          cs:sg.chip_score!=null?sg.chip_score:'—',
          ms:sg.theme_score!=null?sg.theme_score:'—',
          fs:sg.final_score!=null?sg.final_score:'—',
          ai:sg.summary||'—'
        };
      });
    }

    // ---- 題材熱度：讀 themes（有真實就覆蓋範例）----
    try{
      const th = await sbGet(
        'themes?select=theme_name,heat_score,trend_status,description'+
        '&order=heat_score.desc', 200);
      if(Array.isArray(th) && th.length){
        DATA.themes = th.map((t,i)=>{
          const mg = String(t.description||'').match(/平均漲幅\s*(-?[\d.]+)%/);
          return {
            id:'t'+i, themeId:t.id, name:t.theme_name, score:t.heat_score,
            gain:(mg?(parseFloat(mg[1])>0?'+':'')+mg[1]+'%':'—'),
            vol:'—', limit:0, high:0,
            status:t.trend_status||'—',
            desc:t.description||'', chain:'—'
          };
        });
        DATA.themeList = DATA.themes.map(t=>t.name);
        const ts = await sbGet('theme_stocks?select=theme_id,symbol,role,supply_chain_level,relevance_score,note', 20000);
        const symbols = [...new Set((ts||[]).map(x=>x.symbol).filter(Boolean))];
        let stockMap={};
        if(symbols.length){
          const stRows = await sbGet('stocks?select=symbol,name,industry', 20000);
          (stRows||[]).forEach(s=>stockMap[s.symbol]=s);
        }
        const byTheme={};
        (ts||[]).forEach(r=>{
          const sm=stockMap[r.symbol]||{};
          (byTheme[r.theme_id]=byTheme[r.theme_id]||[]).push({
            c:r.symbol,n:sm.name||r.symbol,role:r.role||'成分',
            level:r.supply_chain_level||sm.industry||'未分類',
            score:r.relevance_score||0,note:r.note||''
          });
        });
        DATA.themes.forEach(t=>{t.stocks=(byTheme[t.themeId]||[]).sort((a,b)=>b.score-a.score);});
      }
    }catch(e){ console.warn('themes 載入略過:',e); }

    // ---- 每日篩選：讀 candidate_pool（綜合分排序）----
    try{
      const cp = await sbGet(
        `candidate_pool?select=symbol,name,score,reason&date=eq.${d}`+
        `&order=score.desc&limit=40`, 100);
      if(Array.isArray(cp) && cp.length){
        const pr = await sbGet(
          `daily_prices?select=symbol,close,change_percent,volume&date=eq.${d}`, 20000);
        const pm = {}; (pr||[]).forEach(x=>pm[x.symbol]=x);
        const sg2 = await sbGet(
          `daily_signals?select=symbol,technical_score,chip_score,theme_score,final_score&date=eq.${d}`, 20000);
        const sm = {}; (sg2||[]).forEach(x=>sm[x.symbol]=x);
        const nm = await sbGet('stocks?select=symbol,name', 20000);
        const nmap = {}; (nm||[]).forEach(s=>nmap[s.symbol]=s.name);
        DATA.screen = cp.map(r=>{
          const p = pm[r.symbol]||{}; const s = sm[r.symbol]||{};
          const cpv = parseFloat(p.change_percent);
          const px = parseFloat(p.close);
          const vol = parseInt(p.volume);
          return {
            c:r.symbol, n:nmap[r.symbol]||r.name||r.symbol,
            t:(r.reason||'').slice(0,10)||'—',
            px:isFinite(px)?px:'—',
            dp:isFinite(cpv)?cpv:0,
            vol:isFinite(vol)?vol.toLocaleString('en-US'):'—',
            ts:s.technical_score!=null?s.technical_score:'—',
            cs:s.chip_score!=null?s.chip_score:'—',
            ms:s.theme_score!=null?s.theme_score:'—',
            total:s.final_score!=null?s.final_score:r.score
          };
        });
      }
    }catch(e){ console.warn('candidate_pool 載入略過:',e); }

    // ---- AI 量化實驗室：讀真實 ai_* 資料 ----
    try{
      const ags = await sbGet('ai_agents?select=*&order=id.asc', 50);
      if(Array.isArray(ags) && ags.length){
        // 取每個 agent 最新檢討、回測通過數、買進數
        const revs = await sbGet(
          'ai_reviews?select=agent_id,review_date,self_review,improvement_suggestion'+
          '&order=review_date.desc', 200);
        const bts = await sbGet(
          'ai_backtests?select=agent_id,passed', 2000);
        const trs = await sbGet(
          'ai_trades?select=agent_id,trade_type', 2000);
        const passCnt={}, buyCnt={}, lastRev={};
        (bts||[]).forEach(b=>{ if(b.passed){passCnt[b.agent_id]=(passCnt[b.agent_id]||0)+1;} });
        (trs||[]).forEach(t=>{ if(t.trade_type==='買進'){buyCnt[t.agent_id]=(buyCnt[t.agent_id]||0)+1;} });
        (revs||[]).forEach(r=>{ if(!lastRev[r.agent_id]) lastRev[r.agent_id]=r; });

        DATA.agents = ags.map(a=>{
          const init=a.initial_cash||1000000, cash=a.current_cash!=null?a.current_cash:init;
          const hold=a.current_asset_value||0;
          return {
            id:'ai'+a.id, _id:a.id, name:a.name, type:a.strategy_type||'—',
            pre:0, passed:passCnt[a.id]||0, buy:buyCnt[a.id]||0,
            wr:'—', pos:buyCnt[a.id]||0,
            cum:(((cash+hold-init)/init*100).toFixed(1))+'%',
            mon:'—', win:'—', mdd:'—',
            ver:a.strategy_version||'v1.0', status:a.status||'運行中',
            init:init, cash:cash, hold:hold,
            desc:a.description||''
          };
        });
        await loadAIDetailData(DATA.agents[0].id);
      }
    }catch(e){ console.warn('AI 實驗室載入略過:',e); }

    // ---- 系統設定（後台篩選參數現值）----
    try{
      const st = await sbGet('app_settings?select=key,value', 100);
      if(Array.isArray(st)){
        DATA.appSettings = DATA.appSettings || {};
        st.forEach(x=>DATA.appSettings[x.key]=x.value);
      }
    }catch(e){ console.warn('app_settings 載入略過:',e); }

    SRC_STATUS = '✅ 已連線真實資料 · 交易日 '+DATA.meta.date+
                 ' · 上漲 '+DATA.market.up+' / 下跌 '+DATA.market.down+
                 ' · 題材 '+DATA.themes.length+' · 候選 '+DATA.screen.length+
                 ' · AI '+(DATA.agents?DATA.agents.length:0);
  }catch(e){
    console.warn('Supabase 載入失敗：', e);
    SRC_STATUS = '⚠️ 連線失敗顯示範例：'+(e&&e.message||e);
  }
}

const AUTH_ADMIN={account:'admin',password:'admin123',nick:'系統管理員',role:'admin'};
function readStore(k,fallback){
  try{return JSON.parse(localStorage.getItem(k))||fallback;}catch(e){return fallback;}
}
function writeStore(k,v){localStorage.setItem(k,JSON.stringify(v));}
function users(){return readStore('stockLabUsers',[]);}
function setUsers(v){writeStore('stockLabUsers',v);}
function authUser(){return readStore('stockLabAuth',null);}
function setAuthUser(v){v?writeStore('stockLabAuth',v):localStorage.removeItem('stockLabAuth');}
function activationSettings(){return readStore('stockLabActivation',DATA.activation);}
function setActivationSettings(v){writeStore('stockLabActivation',v);}
function manageableActivationSettings(){return activationSettings().filter(a=>a.id!=='status');}
function entitlements(){return readStore('stockLabEntitlements',{});}
function setEntitlements(v){writeStore('stockLabEntitlements',v);}
function memberEntitlements(account){
  const all=entitlements();
  const rows=all[account]||{};
  return manageableActivationSettings().map(a=>({
    id:a.id,
    name:a.name,
    enabled:!!(rows[a.id]&&rows[a.id].enabled),
    days:rows[a.id]?Number(rows[a.id].days)||0:0
  }));
}
function setMemberEntitlements(account, rows){
  const all=entitlements();
  all[account]={};
  rows.forEach(r=>{all[account][r.id]={enabled:!!r.enabled,days:Number(r.days)||0};});
  setEntitlements(all);
}
function isAdmin(){const u=authUser();return u&&u.role==='admin';}
function hasAccess(id){
  if(isAdmin()) return true;
  const u=authUser();
  if(!u) return false;
  const item=memberEntitlements(u.account).find(a=>a.id===id);
  return !!(item&&item.enabled&&Number(item.days)>0);
}
function isPageAllowed(id){
  const p=PAGES.find(x=>x.id===id);
  if(!p || p.topOnly) return id==='account';
  if(id==='status') return isAdmin();
  if(isAdmin()) return true;
  if(p.grp==='實驗室' || p.grp==='系統') return hasAccess(id);
  return true;
}
function remainingDays(){
  if(isAdmin()) return '無限制';
  const u=authUser();
  if(!u) return '0 天';
  const enabled=memberEntitlements(u.account).filter(a=>a.enabled).map(a=>Number(a.days)||0);
  const days=Math.max(Number(u.daysRemaining)||0, ...enabled, 0);
  return days+' 天';
}
function renderTopAuth(){
  const box=document.getElementById('topAuth');

    : `<button class="btn sm" data-go="account">登入 / 申請</button>`;
  document.querySelectorAll('#topAuth [data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go));
  const out=document.getElementById('topLogoutBtn');
  if(out)out.onclick=()=>{setAuthUser(null);buildNav();go('home');};
}

/* ============ 2. 產業題材地圖 ============ */
let MAP_SEL='glassfiber';
function vMap(){
  const t=DATA.themes.find(x=>x.id===MAP_SEL)||DATA.themes[0];
  const stocks=(t&&Array.isArray(t.stocks))?t.stocks:[];
  const levels=stocks.reduce((acc,s)=>{
    const k=s.level||'未分類';
    (acc[k]=acc[k]||[]).push(s);
    return acc;
  },{});
  const levelNames=Object.keys(levels);
  return `<div class="fade" style="display:flex;flex-direction:column;gap:18px">
   <div style="display:flex;gap:9px;flex-wrap:wrap">
     ${DATA.themeList.map(n=>{const th=DATA.themes.find(x=>x.name===n);
       const id=th?th.id:'_'+n;const on=th&&th.id===MAP_SEL;
       return `<span class="chip ${on?'on':''}" data-theme="${id}">${n}${th?` · ${th.score}`:''}</span>`;}).join('')}
   </div>

   <div class="card">
     <div style="padding:20px 22px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;border-bottom:1px solid var(--border-soft)">

           <h2 style="font-size:21px;font-weight:800;letter-spacing:-.4px">${t.name}</h2>${thBadge(t.status)}</div>
         <p style="color:var(--ink-2);font-size:13.5px;margin-top:8px;line-height:1.55">${t.desc}</p>
       </div>
       <div class="grid" style="grid-template-columns:repeat(3,auto);gap:24px">
         <div class="stat"><span class="k">熱度分數</span><span class="v" style="color:var(--primary)">${t.score}</span></div>
         <div class="stat"><span class="k">平均漲幅</span><span class="v up">${t.gain}</span></div>
         <div class="stat"><span class="k">資金狀態</span><span class="v" style="font-size:18px">${t.vol} 量增</span></div>
       </div>
     </div>
     <div class="card-pad">
       <div class="sec-title">產業鏈位置 · ${t.name}</div>
       ${stocks.length?`<div style="display:flex;gap:10px;overflow-x:auto;padding:4px 0 8px">
       ${levelNames.map((lv,i)=>`<div style="min-width:178px;flex:1;background:var(--blue-tint);border:1px solid var(--blue-soft);border-radius:12px;padding:14px">
         <div style="font-size:11px;font-weight:800;color:var(--primary);letter-spacing:.4px;margin-bottom:9px">${lv}</div>
         ${levels[lv].slice(0,8).map(s=>`<div data-stock="${s.c}" class="lnk" style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px dashed #C7D9F5">
           <span><b class="code">${s.c}</b> ${s.n}</span><span style="color:var(--ink-3)">›</span></div>`).join('')}
       </div>${i<levelNames.length-1?'<div style="display:flex;align-items:center;color:var(--ink-3);font-weight:800">→</div>':''}`).join('')}
       </div>`:`<div class="muted" style="font-size:13px">此題材尚未有 Supabase 成分股資料。</div>`}
     </div>
   </div>

   <div class="card">
     <div class="card-h"><h3>相關股票清單</h3><span class="tag">龍頭 / 補漲 / 材料 / 設備 / 觀察</span></div>

     ${stocks.length?stocks.slice(0,30).map(s=>
       `<tr><td class="code lnk" data-stock="${s.c}">${s.c}</td><td><b>${s.n}</b></td>

       `<tr><td colspan="7" class="muted" style="text-align:center;padding:22px">此題材尚未有相關股票資料</td></tr>`}

/* 抓該股真實歷史，轉成 K 線格式存 DATA.stock.series */
async function loadStockSeries(sym){
  try{
    const rows = await sbGet(
      `daily_prices?select=date,open,high,low,close,volume&symbol=eq.${sym}`+
      `&order=date.asc`, 5000);
    if(Array.isArray(rows) && rows.length>=5){
      DATA.stock.series = rows.map(r=>({
        o:Number(r.open)||Number(r.close)||0,
        h:Number(r.high)||Number(r.close)||0,
        l:Number(r.low)||Number(r.close)||0,
        c:Number(r.close)||0,
        v:Number(r.volume)||0,
        d:String(r.date).slice(0,10)
      })).filter(x=>x.c>0);
      // 帶入最新報價到標頭
      const last=DATA.stock.series[DATA.stock.series.length-1];
      const prev=DATA.stock.series[DATA.stock.series.length-2];
      if(last){
        DATA.stock.px=last.c;
        if(prev&&prev.c) DATA.stock.dp=+(((last.c-prev.c)/prev.c)*100).toFixed(2);
      }
      // 補股名
      try{
        const nm=await sbGet(`stocks?select=name&symbol=eq.${sym}`,2);
        if(nm&&nm[0]&&nm[0].name) DATA.stock.n=nm[0].name;
      }catch(_){}
    }else{
      DATA.stock.series=null; // 無足夠真實資料 -> 由繪圖 fallback
    }
  }catch(e){
    console.warn('個股歷史載入略過:',e);
    DATA.stock.series=null;
  }
}

function genSeries(n,base,vol){let p=base,a=[];for(let i=0;i<n;i++){const o=p,ch=(Math.sin(i/4)+ (Math.random()-.45))*vol;
  const c=Math.max(base*.6,o+ch);const h=Math.max(o,c)*(1+Math.random()*.012);const l=Math.min(o,c)*(1-Math.random()*.012);
  a.push({o,h,l,c,v:Math.round((6000+Math.random()*9000)*(1+Math.abs(ch)/vol))});p=c;}return a;}
function ma(a,k,key='c'){return a.map((_,i)=>i<k-1?null:a.slice(i-k+1,i+1).reduce((s,x)=>s+x[key],0)/k);}
function setupCanvas(id){const c=document.getElementById(id);if(!c)return null;const r=devicePixelRatio||1;
  const w=c.clientWidth,h=c.clientHeight;c.width=w*r;c.height=h*r;const x=c.getContext('2d');x.scale(r,r);return {x,w,h};}
function drawStockCharts(){
  const D=(DATA.stock&&Array.isArray(DATA.stock.series)&&DATA.stock.series.length>=5)
            ? DATA.stock.series.slice(-60)
            : genSeries(60,33,1.1);
  const m5=ma(D,5),m10=ma(D,10),m20=ma(D,20),m60v=D.map(d=>d.c);
  // K 線
  let g=setupCanvas('cK');if(g){const{x,w,h}=g;const pad=8;
    const all=D.flatMap(d=>[d.h,d.l]);const mx=Math.max(...all)*1.01,mn=Math.min(...all)*.99;
    const Y=v=>pad+(mx-v)/(mx-mn)*(h-pad*2);const bw=(w-20)/D.length;
    x.strokeStyle='#F1F5F9';for(let i=0;i<5;i++){const yy=pad+i*(h-pad*2)/4;x.beginPath();x.moveTo(0,yy);x.lineTo(w,yy);x.stroke();}
    D.forEach((d,i)=>{const cx=10+i*bw+bw/2;const up=d.c>=d.o;x.strokeStyle=x.fillStyle=up?'#DC2626':'#16A34A';
      x.beginPath();x.moveTo(cx,Y(d.h));x.lineTo(cx,Y(d.l));x.stroke();
      const yo=Y(d.o),yc=Y(d.c);x.fillRect(cx-bw*.3,Math.min(yo,yc),bw*.6,Math.max(2,Math.abs(yc-yo)));});
    const line=(arr,col)=>{x.strokeStyle=col;x.lineWidth=1.5;x.beginPath();let st=false;
      arr.forEach((v,i)=>{if(v==null)return;const cx=10+i*bw+bw/2,cy=Y(v);st?x.lineTo(cx,cy):x.moveTo(cx,cy);st=true;});x.stroke();};
    line(m5,'#F59E0B');line(m10,'#2563EB');line(m20,'#7C3AED');}
  // 量
  g=setupCanvas('cV');if(g){const{x,w,h}=g;const mv=Math.max(...D.map(d=>d.v));const bw=(w-20)/D.length;
    D.forEach((d,i)=>{const cx=10+i*bw,bh=d.v/mv*(h-6);x.fillStyle=d.c>=d.o?'rgba(220,38,38,.55)':'rgba(22,163,74,.55)';
      x.fillRect(cx,h-bh,bw*.62,bh);});}
  // KD
  g=setupCanvas('cKD');if(g){const{x,w,h}=g;const K=D.map((_,i)=>50+Math.sin(i/3)*28+(Math.random()*8));
    const Kd=K.map((_,i)=>i<2?K[i]:(K[i]+K[i-1]+K[i-2])/3);
    [[K,'#DC2626'],[Kd,'#2563EB']].forEach(([s,c])=>{x.strokeStyle=c;x.lineWidth=1.5;x.beginPath();
      s.forEach((v,i)=>{const cx=i/(s.length-1)*w,cy=h-v/100*h;i?x.lineTo(cx,cy):x.moveTo(cx,cy);});x.stroke();});}
  // MACD
  g=setupCanvas('cMD');if(g){const{x,w,h}=g;const bars=D.map((_,i)=>Math.sin(i/5)*1.2+(Math.random()-.5)*.4);
    const bw=w/bars.length;bars.forEach((v,i)=>{x.fillStyle=v>=0?'rgba(220,38,38,.7)':'rgba(22,163,74,.7)';
      const bh=Math.abs(v)/2*(h/2);x.fillRect(i*bw,h/2-(v>0?bh:0),bw*.7,bh);});
    x.strokeStyle='#94A3B8';x.beginPath();x.moveTo(0,h/2);x.lineTo(w,h/2);x.stroke();}
  // RSI
  g=setupCanvas('cRS');if(g){const{x,w,h}=g;const R=D.map((_,i)=>50+Math.sin(i/3.5)*22+(Math.random()*6));
    x.strokeStyle='#E2E8F0';[30,70].forEach(l=>{const yy=h-l/100*h;x.beginPath();x.moveTo(0,yy);x.lineTo(w,yy);x.stroke();});
    x.strokeStyle='#2563EB';x.lineWidth=1.6;x.beginPath();
    R.forEach((v,i)=>{const cx=i/(R.length-1)*w,cy=h-v/100*h;i?x.lineTo(cx,cy):x.moveTo(cx,cy);});x.stroke();}
}

/* ============ 事件綁定 ============ */
function bindPage(id){
  document.querySelectorAll('[data-stock]').forEach(el=>el.onclick=async()=>{
    DATA.stock.c=el.dataset.stock;
    await loadStockSeries(el.dataset.stock);
    go('stock');});
  document.querySelectorAll('[data-theme]').forEach(el=>el.onclick=()=>{
    const t=DATA.themes.find(x=>x.id===el.dataset.theme); if(t){MAP_SEL=t.id;go('map');}});
  const loginBtn=document.getElementById('loginBtn');
  if(loginBtn)loginBtn.onclick=async()=>{
    const account=(document.getElementById('loginAccount')||{}).value?.trim()||'';
    const password=(document.getElementById('loginPassword')||{}).value||'';
    const msg=document.getElementById('loginMsg');
    if(msg){msg.textContent='登入中…';msg.style.color='var(--ink-2)';}
    const remote=account===AUTH_ADMIN.account?null:await remoteLogin(account,password);
    const found=(account===AUTH_ADMIN.account&&password===AUTH_ADMIN.password)
      ? AUTH_ADMIN
      : (remote || users().find(u=>u.account===account&&u.password===password));
    if(!found){
      if(msg){msg.textContent='帳號或密碼錯誤';msg.style.color='#92400E';}
      return;
    }
    setAuthUser({account:found.account,nick:found.nick,role:found.role||'user',daysRemaining:found.daysRemaining||0});
    await loadRemoteEntitlements(found.account);
    buildNav();
    go(id==='admin'?'admin':'home');
  };
  const registerBtn=document.getElementById('registerBtn');
  if(registerBtn)registerBtn.onclick=async()=>{
    const account=(document.getElementById('regAccount')||{}).value?.trim()||'';
    const password=(document.getElementById('regPassword')||{}).value||'';
    const nick=(document.getElementById('regNick')||{}).value?.trim()||'';
    const msg=document.getElementById('registerMsg');
    if(!account||!password||!nick){
      if(msg){msg.textContent='請填寫帳號、密碼與暱稱';msg.style.color='#92400E';}
      return;
    }
    if(account===AUTH_ADMIN.account||users().some(u=>u.account===account)){
      if(msg){msg.textContent='此帳號已存在';msg.style.color='#92400E';}
      return;
    }
    if(msg){msg.textContent='送出中…';msg.style.color='var(--ink-2)';}
    await remoteRegister(account,password,nick);
    const next=[...users(),{account,password,nick,role:'user',createdAt:new Date().toISOString()}];
    setUsers(next);
    if(msg){msg.textContent='申請完成，可直接登入';msg.style.color='var(--up)';}
  };
  const logoutBtn=document.getElementById('logoutBtn');
  if(logoutBtn)logoutBtn.onclick=()=>{setAuthUser(null);buildNav();go('home');};
  if(id==='screen'){
    const upd=()=>{document.getElementById('selCnt').textContent=SEL.size;
      document.querySelectorAll('[data-f]').forEach(c=>c.classList.toggle('on',SEL.has(c.dataset.f)));};
    document.querySelectorAll('[data-f]').forEach(c=>c.onclick=()=>{
      SEL.has(c.dataset.f)?SEL.delete(c.dataset.f):SEL.add(c.dataset.f);upd();});
    document.getElementById('clrBtn').onclick=()=>{SEL.clear();upd();
      document.getElementById('resBody').innerHTML=rowsScreen([]);document.getElementById('resCnt').textContent=0;};
    document.getElementById('runBtn').onclick=()=>{
      const n=Math.max(3,Math.min(DATA.screen.length,DATA.screen.length-((4-SEL.size)%4+4)%4));
      const r=DATA.screen.slice(0,Math.max(3,n));document.getElementById('resBody').innerHTML=rowsScreen(r);
      document.getElementById('resCnt').textContent=r.length;
      document.querySelectorAll('#resBody [data-stock]').forEach(el=>el.onclick=async()=>{DATA.stock.c=el.dataset.stock;await loadStockSeries(el.dataset.stock);go('stock');});};
  }
  if(id==='ai'){
    document.querySelectorAll('[data-ai]').forEach(el=>el.onclick=async()=>{AI_VIEW=el.dataset.ai;await loadAIDetailData(AI_VIEW);go('ai');});
    const bk=document.querySelector('[data-aiback]');if(bk)bk.onclick=()=>{AI_VIEW=null;go('ai');};
  }
  if(id==='stock'){
    const inp=document.getElementById('stkInput');
    const btn=document.getElementById('stkSearchBtn');
    const doSearch=async()=>{
      const v=(inp&&inp.value||'').trim();
      if(!/^[1-9]\d{3}$/.test(v)){
        alert('請輸入 4 位數字股票代號（例：1815）');return;
      }
      if(btn){btn.textContent='查詢中…';btn.disabled=true;}
      DATA.stock.c=v;
      await loadStockSeries(v);
      if(!DATA.stock.series){
        if(btn){btn.textContent='查詢';btn.disabled=false;}
        alert('查無「'+v+'」的歷史資料（可能非上市櫃普通股，或資料庫尚未收錄）');
        return;
      }
      go('stock');
    };
    if(btn)btn.onclick=doSearch;
    if(inp)inp.onkeydown=(e)=>{ if(e.key==='Enter')doSearch(); };
  }
  if(id==='admin'){
    admBody(0);
    const bindActivation=()=>{
      const memberSelect=document.getElementById('memberSelect');
      if(memberSelect)memberSelect.onchange=async()=>{
        localStorage.setItem('stockLabAdminMember',memberSelect.value);
        await loadRemoteEntitlements(memberSelect.value);
        admBody(4);bindActivation();
      };
      const openAll=document.getElementById('openAllBtn');
      if(openAll)openAll.onclick=()=>{
        const account=(document.getElementById('memberSelect')||{}).value||'';
        if(!account) return;
        const days=Math.max(1,parseInt((document.getElementById('allDaysInput')||{}).value,10)||1);
        const rows=manageableActivationSettings().map(a=>({...a,enabled:true,days}));
        setMemberEntitlements(account,rows);
        admBody(4);bindActivation();
        const msg=document.getElementById('activationMsg');
        if(msg){msg.textContent='已套用全部板塊 '+days+' 天，請儲存';msg.style.color='var(--up)';}
      };
      document.querySelectorAll('[data-act-toggle]').forEach(btn=>btn.onclick=()=>{
        const account=(document.getElementById('memberSelect')||{}).value||'';
        if(!account) return;
        const acts=memberEntitlements(account);
        const item=acts.find(a=>a.id===btn.dataset.actToggle);
        if(item){item.enabled=!item.enabled;setMemberEntitlements(account,acts);admBody(4);bindActivation();}
      });
      const saveAct=document.getElementById('saveActivationBtn');
      if(saveAct)saveAct.onclick=async()=>{
        const account=(document.getElementById('memberSelect')||{}).value||'';
        if(!account) return;
        const acts=memberEntitlements(account).map(a=>({
          ...a,
          days:Math.max(1,parseInt((document.getElementById('act_days_'+a.id)||{}).value,10)||1)
        }));
        setMemberEntitlements(account,acts);
        await saveRemoteEntitlements(account,acts);
        const msg=document.getElementById('activationMsg');
        if(msg){msg.textContent='已儲存 '+account+' 的板塊開通與天數';msg.style.color='var(--up)';}
      };
    };
    document.querySelectorAll('#admSeg button').forEach(btn=>btn.onclick=()=>{
      document.querySelectorAll('#admSeg button').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');admBody(+btn.dataset.tab);bindActivation();});
    bindActivation();
  }
}
window.addEventListener('resize',()=>{if(CUR==='stock')drawStockCharts();});

/* ============ 初始化 ============ */
buildNav();
go('home');
loadRemoteActivation().then(()=>{ buildNav(); if(CUR!=='account') go(CUR||'home'); });
loadRemoteUsers().then(()=>{ if(isAdmin()&&CUR==='admin') go('admin'); });
/* 背景嘗試載入真實資料，成功後重繪當前頁（連不上就維持範例畫面） */
loadReal().then(()=>{ go(CUR||'home'); });
</script>
